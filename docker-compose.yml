services:
  grafana:
    image: grafana/grafana:latest
    container_name: observability-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - loki
    networks:
      - observability

  loki:
    image: grafana/loki:latest
    container_name: observability-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki-data:/loki
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
    networks:
      - observability

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: observability-cloudflared
    profiles:
      - tunnel
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - grafana
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  grafana-data:
  loki-data:
