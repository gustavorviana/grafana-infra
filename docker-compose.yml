services:
  grafana: #Porta de acesso :3000
    image: grafana/grafana:latest
    container_name: observability-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      GF_SERVER_DOMAIN: ${GF_SERVER_DOMAIN}
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - loki
    networks:
      - observability

  loki: #Porta de acesso :3100
    image: grafana/loki:latest
    container_name: observability-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/data:/loki
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
    networks:
      - observability

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: observability-cloudflared
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - grafana
    networks:
      - observability

  logs-app:
    build:
      context: ./logs-app
      dockerfile: Dockerfile
    container_name: observability-logs-app
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      LOKI_URL: http://observability-loki:3100
    env_file:
      - ./logs-app/.env
    volumes:
      - ./logs-app/data:/app/data
    depends_on:
      - loki
    networks:
      - observability

networks:
  observability:
    driver: bridge